<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Magnetartikel Verwaltung</title>
<link rel="stylesheet" href="webui.css">
</head>

<body>
<div id="overlay" class="overlay hidden"></div>

<h1>Magnetartikel Verwaltung</h1>

<div class="toolbar">
<button onclick="newItem()">Neu</button>
<button onclick="saveFile()">Speichern</button>
</div>

<table id="table">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Typ</th>
<th>Decoder</th>
<th>Aktion</th>
</tr>
</thead>
<tbody></tbody>
</table>


<div id="editor" class="modal hidden">

<h2>Magnetartikel</h2>

<label>Adresse (ID)</label>
<input id="id" type="number">

<label>Name</label>
<input id="name">

<label>Typ</label>
<select id="type">

<optgroup label="Weichen">
<option value="rechtsweiche">Rechtsweiche</option>
<option value="linksweiche">Linksweiche</option>
<option value="dreiwegweiche">Dreiwegweiche</option>
<option value="doppelkreuzungsweiche">DKW</option>
</optgroup>

<optgroup label="Signale">
<option value="lichtsignal_HP01">HP0/HP1</option>
<option value="lichtsignal_HP012">HP0/HP1/HP2</option>
<option value="lichtsignal_HP012_SH01">HP0/HP1/HP2/Sh1</option>
<option value="urc_lichtsignal_HP012_SH01">URC Signal</option>
</optgroup>

<optgroup label="Sonstiges">
<option value="entkuppler">Entkuppler</option>
<option value="k84">Schaltausgang</option>
</optgroup>

</select>

<label>Decoder</label>
<select id="decoder">
<option value="mm2">MM2</option>
<option value="dcc">DCC</option>
</select>

<label>Schaltzeit</label>
<input id="time" type="number" value="200">

<label>Position</label>
<input id="position" type="number" value="1">

<div class="buttons">
<button onclick="saveItem()">Speichern</button>
<button onclick="closeEditor()">Abbrechen</button>
</div>

</div>

<script src="magnetartikel.js"></script>

</body>
</html>
